<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7c59;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Mountains silhouette -->
  <polygon points="0,350 150,180 300,280 450,150 600,250 750,170 800,220 800,500 0,500" fill="rgba(0,0,0,0.2)"/>
  <polygon points="0,400 100,280 250,340 400,220 550,300 700,240 800,280 800,500 0,500" fill="rgba(0,0,0,0.3)"/>
  <!-- Sun -->
  <circle cx="640" cy="120" r="55" fill="rgba(232,160,32,0.25)" />
  <circle cx="640" cy="120" r="38" fill="rgba(232,160,32,0.4)" />
  <!-- Text -->
  <text x="400" y="210" font-family="Georgia, serif" font-size="32" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="bold">Tamil Nadu Destination</text>
  <text x="400" y="248" font-family="Georgia, serif" font-size="16" fill="rgba(255,255,255,0.45)" text-anchor="middle">Image coming soon</text>
  <!-- Icon -->
  <text x="400" y="170" font-family="Arial" font-size="42" text-anchor="middle">🏔️</text>
